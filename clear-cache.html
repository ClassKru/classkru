<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassKru — ล้างข้อมูล Cache</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f7; }
    .box { background: #fff; border-radius: 16px; padding: 32px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.08); max-width: 360px; width: 90%; }
    .icon { font-size: 3rem; margin-bottom: 12px; }
    h2 { font-size: 1.2rem; font-weight: 800; margin: 0 0 8px; }
    p { font-size: 0.85rem; color: #86868b; margin: 0 0 24px; line-height: 1.6; }
    .size { font-size: 0.9rem; font-weight: 700; color: #34c759; margin-bottom: 16px; }
    button { width: 100%; padding: 12px; border-radius: 10px; font-size: 0.9rem; font-weight: 700; cursor: pointer; border: none; background: #34c759; color: #fff; margin-bottom: 10px; }
    .btn-cancel { background: #f5f5f7; color: #1d1d1f; border: 1px solid #e5e5ea; }
    .result { margin-top: 16px; font-size: 0.85rem; font-weight: 700; color: #34c759; display: none; }
  </style>
</head>
<body>
<div class="box">
  <div class="icon">🧹</div>
  <h2>ล้างข้อมูล Cache</h2>
  <p>ข้อมูลบน Cloud ยังปลอดภัย<br>จะดึงกลับมาหลัง reload อัตโนมัติ</p>
  <div class="size" id="size-display"></div>
  <button onclick="doClear()">ล้าง Cache แล้ว Reload</button>
  <button class="btn-cancel" onclick="window.location='index.html'">ยกเลิก กลับแอป</button>
  <div class="result" id="result">✅ ล้างเรียบร้อย กำลัง redirect...</div>
</div>
<script>
  const KEY = 'classkru_mobile_v4';
  const data = localStorage.getItem(KEY);
  const kb = data ? (data.length / 1024).toFixed(1) : '0';
  document.getElementById('size-display').innerText = `ขนาดข้อมูลปัจจุบัน: ${kb} KB`;

  function doClear() {
    localStorage.removeItem(KEY);
    document.getElementById('result').style.display = 'block';
    setTimeout(() => { window.location = 'index.html'; }, 1200);
  }
</script>
</body>
</html>
